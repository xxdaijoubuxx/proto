<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>おやすみ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400&family=DM+Mono:wght@300;400&display=swap');

  :root {
    --ink: #12111a;
    --paper: #ede8df;
    --dim: #6b6458;
    --warm: #b8895a;
    --soft: #d4c9b8;
    --glow: rgba(184,137,90,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'Noto Serif JP', serif;
    min-height: 100vh;
    overflow: hidden;
  }

  canvas#sky { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

  #clock {
    position: fixed; top: 1.2rem; right: 1.4rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.72rem; color: var(--dim); letter-spacing: .12em;
    z-index: 10;
  }

  .screen {
    display: none; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem 1.6rem;
    text-align: center;
    animation: rise 0.7s cubic-bezier(.4,0,.2,1);
    width: 100%; max-width: 440px; margin: 0 auto;
    position: relative; z-index: 1;
  }
  .screen.active { display: flex; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* S1 */
  #s1 .moon-wrap span { font-size: 3.6rem; display: inline-block; animation: drift 5s ease-in-out infinite; margin-bottom: 1.8rem; }
  @keyframes drift { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-9px)} }
  #s1 .label { font-size: .82rem; letter-spacing: .22em; color: var(--dim); margin-bottom: 3rem; }
  .big-btn {
    width: 152px; height: 152px; border-radius: 50%;
    border: 1.5px solid rgba(184,137,90,.35);
    background: radial-gradient(circle at 38% 34%, rgba(184,137,90,.12), transparent 68%);
    color: var(--warm); font-family: 'Noto Serif JP', serif;
    font-size: .95rem; font-weight: 300; letter-spacing: .12em;
    cursor: pointer; transition: all .3s; position: relative;
  }
  .big-btn:hover { border-color: rgba(184,137,90,.75); box-shadow: 0 0 36px var(--glow); }
  .big-btn:active { transform: scale(.96); }

  /* S2 */
  #s2 .star-icon { font-size: 2.4rem; margin-bottom: .8rem; }
  #s2 h2 { font-size: 1.35rem; font-weight: 300; margin-bottom: .5rem; }
  #s2 .sub { color: var(--dim); font-size: .82rem; line-height: 1.9; margin-bottom: 2.2rem; }
  .menu { display: flex; flex-direction: column; gap: .7rem; width: 100%; }
  .menu-btn {
    background: transparent; border: 1px solid rgba(237,232,223,.16);
    color: var(--paper); font-family: 'Noto Serif JP', serif;
    font-size: .88rem; font-weight: 300; padding: .85rem 1.1rem;
    border-radius: 3px; cursor: pointer; transition: all .22s;
    letter-spacing: .04em; text-align: left;
  }
  .menu-btn:hover { border-color: var(--warm); color: var(--warm); background: rgba(184,137,90,.05); }

  /* S3 会話 */
  #s3 { justify-content: flex-start; padding-top: 3.5rem; overflow: hidden; }
  #s3 .chat-header { margin-bottom: 1rem; width: 100%; }
  #s3 .chat-header h2 { font-size: 1rem; font-weight: 300; letter-spacing: .1em; color: var(--soft); }
  .turn-count { font-size: .72rem; color: var(--dim); margin-top: .25rem; font-family: 'DM Mono', monospace; }
  #chat-log {
    width: 100%; overflow-y: auto; padding: .4rem 0;
    display: flex; flex-direction: column; gap: .9rem;
    max-height: 44vh; -webkit-overflow-scrolling: touch;
  }
  .bubble {
    max-width: 90%; line-height: 1.75; font-size: .87rem; font-weight: 300;
    padding: .7rem .95rem; border-radius: 4px; animation: rise .4s ease;
  }
  .bubble.ai { align-self: flex-start; background: rgba(237,232,223,.07); border-left: 2px solid rgba(184,137,90,.45); color: var(--soft); }
  .bubble.user { align-self: flex-end; background: rgba(184,137,90,.1); border-right: 2px solid rgba(184,137,90,.45); color: var(--paper); text-align: right; }
  .bubble.thinking { color: var(--dim); font-style: italic; align-self: flex-start; }
  .chat-input-row { width: 100%; display: flex; gap: .6rem; margin-top: .9rem; align-items: flex-end; }
  #chat-input {
    flex: 1; background: rgba(237,232,223,.06);
    border: 1px solid rgba(237,232,223,.18); border-radius: 3px;
    color: var(--paper); font-family: 'Noto Serif JP', serif;
    font-size: .88rem; font-weight: 300; padding: .65rem .9rem;
    outline: none; resize: none; line-height: 1.6; max-height: 100px;
    transition: border-color .2s;
  }
  #chat-input:focus { border-color: rgba(184,137,90,.5); }
  #chat-input::placeholder { color: var(--dim); }
  #send-btn {
    background: transparent; border: 1px solid rgba(184,137,90,.4);
    color: var(--warm); font-size: 1.1rem; width: 40px; height: 40px;
    border-radius: 3px; cursor: pointer; transition: all .2s; flex-shrink: 0;
  }
  #send-btn:hover { background: rgba(184,137,90,.1); }
  #send-btn:disabled { opacity: .35; cursor: default; }
  #chat-finish-btn {
    margin-top: .8rem; background: transparent;
    border: 1px solid rgba(184,137,90,.3); color: var(--dim);
    font-family: 'Noto Serif JP', serif; font-size: .78rem;
    padding: .5rem 1.4rem; border-radius: 2px; cursor: pointer;
    letter-spacing: .1em; transition: all .22s;
  }
  #chat-finish-btn:hover { color: var(--warm); border-color: var(--warm); }

  /* S4 呼吸法 */
  #s4 h2 { font-size: 1.1rem; font-weight: 300; margin-bottom: .35rem; }
  .breath-sub { color: var(--dim); font-size: .78rem; margin-bottom: 1.6rem; }
  .breath-outer {
    width: 148px; height: 148px; border-radius: 50%;
    border: 1px solid rgba(184,137,90,.2);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.2rem;
  }
  #breath-ring {
    width: 116px; height: 116px; border-radius: 50%;
    background: radial-gradient(circle at 42% 38%, rgba(184,137,90,.28), transparent 72%);
    border: 1.5px solid rgba(184,137,90,.5);
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: .15rem;
    transition: transform .8s ease-in-out, opacity .8s ease-in-out;
  }
  #breath-ring .phase-name { font-size: .72rem; color: var(--warm); letter-spacing: .08em; }
  #breath-ring .countdown { font-family: 'DM Mono', monospace; font-size: 1.8rem; color: var(--paper); font-weight: 300; line-height: 1; }
  #breath-label { color: var(--dim); font-size: .73rem; letter-spacing: .15em; margin-bottom: 1rem; height: 1.3em; }
  #breath-info { color: var(--dim); font-size: .76rem; line-height: 1.9; margin-bottom: 1.4rem; }

  /* S5 宣言 */
  #s5 h2 { font-size: 1.1rem; font-weight: 300; margin-bottom: .4rem; }
  #s5 .sub { color: var(--dim); font-size: .8rem; margin-bottom: 1.6rem; }
  #s5 textarea {
    width: 100%; background: rgba(237,232,223,.05);
    border: 1px solid rgba(237,232,223,.18); border-radius: 3px;
    color: var(--paper); font-family: 'Noto Serif JP', serif;
    font-size: .92rem; font-weight: 300; padding: 1rem; resize: none;
    line-height: 1.85; outline: none; transition: border-color .2s; min-height: 110px;
  }
  #s5 textarea:focus { border-color: rgba(184,137,90,.5); }
  #s5 textarea::placeholder { color: var(--dim); }

  /* S6 おやすみ */
  #s6 { overflow-y: auto; justify-content: flex-start; padding-top: 4rem; }
  #s6 .final-moon { font-size: 2.8rem; margin-bottom: .9rem; }
  #s6 h2 { font-size: 1.2rem; font-weight: 300; margin-bottom: .5rem; }
  .decl-box {
    margin: 1rem 0 1.2rem; padding: .85rem 1.1rem;
    border-left: 2px solid var(--warm); text-align: left;
    color: var(--soft); font-size: .88rem; line-height: 1.85; font-style: italic;
  }
  .final-msg { color: var(--dim); font-size: .82rem; line-height: 1.9; margin-bottom: 1.6rem; }
  #log-area {
    width: 100%; background: rgba(237,232,223,.04);
    border: 1px solid rgba(237,232,223,.12); border-radius: 3px;
    padding: .9rem 1rem; font-family: 'DM Mono', monospace; font-size: .68rem;
    color: var(--dim); line-height: 1.9; text-align: left;
    white-space: pre-wrap; max-height: 220px; overflow-y: auto;
  }
  .log-copy-btn {
    margin-top: .7rem; background: transparent;
    border: 1px solid rgba(184,137,90,.3); color: var(--dim);
    font-family: 'Noto Serif JP', serif; font-size: .75rem;
    padding: .45rem 1.2rem; border-radius: 2px; cursor: pointer;
    letter-spacing: .08em; transition: all .22s;
  }
  .log-copy-btn:hover { color: var(--warm); border-color: var(--warm); }

  /* フローティングナビ */
  #float-nav {
    position: fixed; bottom: 1.6rem; left: 50%; transform: translateX(-50%);
    display: none; gap: .6rem; z-index: 20;
    background: rgba(18,17,26,.75); backdrop-filter: blur(10px);
    border: 1px solid rgba(237,232,223,.1); border-radius: 40px;
    padding: .45rem .6rem;
  }
  #float-nav.visible { display: flex; }
  .fn-btn {
    background: transparent; border: none;
    color: var(--dim); font-family: 'Noto Serif JP', serif;
    font-size: .68rem; letter-spacing: .04em; cursor: pointer;
    padding: .38rem .7rem; border-radius: 30px;
    transition: all .2s; white-space: nowrap;
  }
  .fn-btn:hover { color: var(--paper); background: rgba(237,232,223,.07); }
  .fn-btn.sep { color: rgba(237,232,223,.15); cursor: default; padding: 0 .1rem; font-size: .8rem; }
  .fn-btn.accent { color: var(--warm); }
  .fn-btn.accent:hover { background: rgba(184,137,90,.1); }

  /* 共通 */
  .nav-btn {
    background: transparent; border: 1px solid rgba(184,137,90,.38);
    color: var(--warm); font-family: 'Noto Serif JP', serif;
    font-size: .82rem; font-weight: 300; padding: .65rem 1.8rem;
    border-radius: 2px; cursor: pointer; letter-spacing: .1em;
    transition: all .22s; margin-top: .9rem;
  }
  .nav-btn:hover { background: rgba(184,137,90,.09); border-color: var(--warm); }
  .skip { margin-top: 1rem; color: var(--dim); font-size: .73rem; cursor: pointer; letter-spacing: .1em; }
  .skip:hover { color: var(--paper); }
</style>
</head>
<body>

<canvas id="sky"></canvas>
<div id="clock"></div>

<!-- フローティングナビ（S2〜S5で表示） -->
<div id="float-nav">
  <button class="fn-btn" id="fn-talk"    onclick="startChat()">💬 話す</button>
  <button class="fn-btn" id="fn-breath"  onclick="go('s4')">🌬️ 呼吸法</button>
  <button class="fn-btn" id="fn-decl"    onclick="go('s5')">📝 明日のこと</button>
  <button class="fn-btn accent" id="fn-sleep" onclick="finish(null)">🌙 もう寝る</button>
</div>

<!-- S1 -->
<div class="screen active" id="s1">
  <div class="moon-wrap"><span>🌙</span></div>
  <div class="label">よこになった</div>
  <button class="big-btn" onclick="go('s2')">布団に入った</button>
</div>

<!-- S2 -->
<div class="screen" id="s2">
  <div class="star-icon">✨</div>
  <h2>よく押した</h2>
  <p class="sub">SNSを開かずにここを押せた。<br>それだけで今夜は十分。<br><br>このあとどうする？</p>
  <div class="menu">
    <button class="menu-btn" onclick="startChat()">💬 今日の気分を話す</button>
    <button class="menu-btn" onclick="go('s4')">🌬️ 呼吸で眠る</button>
    <button class="menu-btn" onclick="go('s5')">📝 明日の宣言だけする</button>
    <button class="menu-btn" onclick="finish(null)">🌙 そのままおやすみ</button>
  </div>
</div>

<!-- S3 会話 -->
<div class="screen" id="s3">
  <div class="chat-header">
    <h2>今夜のきもち</h2>
    <div class="turn-count" id="turn-count">— / 3</div>
  </div>
  <div id="chat-log"></div>
  <div class="chat-input-row">
    <textarea id="chat-input" placeholder="ここに書く…" rows="1"
      oninput="autoResize(this)"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
    <button id="send-btn" onclick="sendMsg()">↑</button>
  </div>
  <button id="chat-finish-btn" onclick="go('s5')" style="display:none">宣言へ →</button>
</div>

<!-- S4 呼吸法 -->
<div class="screen" id="s4">
  <h2>4 · 7 · 8 呼吸</h2>
  <p class="breath-sub">副交感神経を整える。4セットどうぞ。</p>
  <div class="breath-outer">
    <div id="breath-ring">
      <span class="phase-name" id="phase-name">—</span>
      <span class="countdown" id="countdown">—</span>
    </div>
  </div>
  <div id="breath-label">スタートを押してください</div>
  <p id="breath-info">吸う 4秒 → 止める 7秒 → 吐く 8秒</p>
  <button class="nav-btn" id="breath-start-btn" onclick="startBreath()">スタート</button>
  <div class="skip" onclick="go('s5')">宣言へスキップ</div>
</div>

<!-- S5 宣言 -->
<div class="screen" id="s5">
  <h2>明日、ひとつだけ</h2>
  <p class="sub">小さくていい。「〜したい」でいい。</p>
  <textarea id="declaration" placeholder="例：朝ごはんを食べる&#10;例：散歩に10分出る&#10;例：何もしない時間をつくる"></textarea>
  <button class="nav-btn" onclick="finish(document.getElementById('declaration').value.trim())">これでおやすみ</button>
  <div class="skip" onclick="finish(null)">スキップ</div>
</div>

<!-- S6 おやすみ＋ログ -->
<div class="screen" id="s6">
  <div class="final-moon">🌙</div>
  <h2>おやすみなさい</h2>
  <div class="decl-box" id="decl-box" style="display:none"></div>
  <p class="final-msg" id="final-msg"></p>
  <div id="log-area"></div>
  <button class="log-copy-btn" onclick="copyLog()">ログをコピー</button>
</div>

<script>
// ── 星空 ──
const canvas = document.getElementById('sky');
const ctx = canvas.getContext('2d');
let stars = [];
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
function initStars() {
  stars = Array.from({length:65}, () => ({
    x: Math.random(), y: Math.random(),
    r: Math.random() * 1.2 + .3,
    op: Math.random() * .55 + .15,
    speed: Math.random() * .01 + .004,
    phase: Math.random() * Math.PI * 2
  }));
}
let rafId;
function drawStars(t) {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  stars.forEach(s => {
    const a = s.op * (.5 + .5 * Math.sin(t * s.speed + s.phase));
    ctx.beginPath();
    ctx.arc(s.x * canvas.width, s.y * canvas.height, s.r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(237,232,223,${a})`;
    ctx.fill();
  });
  rafId = requestAnimationFrame(drawStars);
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas(); initStars(); requestAnimationFrame(drawStars);

// ── 時計 ──
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
}
updateClock(); setInterval(updateClock, 10000);

// ── JST タイムスタンプ ──
function jstNow() {
  return new Date().toLocaleString('ja-JP', {
    timeZone: 'Asia/Tokyo',
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
  });
}

// ── 画面遷移 ──
function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.add('active');
  if (id === 's4') resetBreath();
  const nav = document.getElementById('float-nav');
  const showNav = !['s1','s6'].includes(id);
  nav.className = showNav ? 'visible' : '';
  // 現在の画面に対応するボタンを淡く
  document.getElementById('fn-talk').style.opacity   = id === 's3' ? '.35' : '1';
  document.getElementById('fn-breath').style.opacity = id === 's4' ? '.35' : '1';
  document.getElementById('fn-decl').style.opacity   = id === 's5' ? '.35' : '1';
}

// ── ログ状態 ──
const log = { start: jstNow(), chatLines: [], declaration: null, breathDone: false, end: null };

// ── 会話 ──
const MAX_TURNS = 3;
let turns = 0;
let chatHistory = [];

function startChat() {
  turns = 0;
  chatHistory = [];
  document.getElementById('chat-log').innerHTML = '';
  document.getElementById('chat-finish-btn').style.display = 'none';
  const inp = document.getElementById('chat-input');
  inp.style.display = ''; inp.value = ''; inp.style.height = 'auto';
  document.getElementById('send-btn').style.display = '';
  document.getElementById('turn-count').textContent = `0 / ${MAX_TURNS}`;
  go('s3');
  aiFirst();
}

async function aiFirst() {
  setBtnState(true);
  addBubble('thinking', '…');
  const reply = await callClaude([{role:'user', content:'こんばんは。寝る前に少し話を聞いてほしい。今日のことや気分を聞いてください。'}]);
  removeLast();
  addBubble('ai', reply);
  chatHistory.push({role:'assistant', content: reply});
  setBtnState(false);
}

function addBubble(type, text) {
  const logEl = document.getElementById('chat-log');
  const div = document.createElement('div');
  div.className = `bubble ${type}`;
  div.textContent = text;
  logEl.appendChild(div);
  logEl.scrollTop = logEl.scrollHeight;
}
function removeLast() {
  const logEl = document.getElementById('chat-log');
  if (logEl.lastChild) logEl.removeChild(logEl.lastChild);
}
function setBtnState(disabled) {
  document.getElementById('send-btn').disabled = disabled;
  document.getElementById('chat-input').disabled = disabled;
}
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

async function sendMsg() {
  const inp = document.getElementById('chat-input');
  const text = inp.value.trim();
  if (!text || inp.disabled) return;
  inp.value = ''; inp.style.height = 'auto';

  addBubble('user', text);
  chatHistory.push({role:'user', content: text});
  log.chatLines.push(`[自分] ${text}`);
  turns++;
  document.getElementById('turn-count').textContent = `${turns} / ${MAX_TURNS}`;
  setBtnState(true);

  const isFinal = turns >= MAX_TURNS;
  addBubble('thinking', '…');
  const reply = await callClaude(chatHistory, isFinal);
  removeLast();
  addBubble('ai', reply);
  log.chatLines.push(`[Claude] ${reply}`);

  if (isFinal) {
    chatHistory.push({role:'assistant', content: reply});
    setBtnState(false);
    document.getElementById('chat-finish-btn').style.display = 'block';
    inp.style.display = 'none';
    document.getElementById('send-btn').style.display = 'none';
    document.getElementById('turn-count').textContent = `完了`;
  } else {
    chatHistory.push({role:'assistant', content: reply});
    setBtnState(false);
  }
}

async function callClaude(history, isFinal = false) {
  const system = isFinal
    ? `あなたは就寝前の静かな聞き役です。ユーザーが今日の気分や体調を話してくれました。これが最後の返答です。3文以内で温かく受け止め、「おやすみなさい」で締めてください。説教・提案・アドバイスは不要です。`
    : `あなたは就寝前の静かな聞き役です。ユーザーの今夜の気分・体調・出来事に耳を傾けています。返答は2〜3文、短く。評価せずただ受け止める。自然に次の一問を添える。眠りに向かう穏やかな雰囲気を保つこと。`;
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system,
        messages: history
      })
    });
    const data = await res.json();
    return data.content?.[0]?.text || '…';
  } catch {
    return 'うまく繋がらなかった。また話しましょう。';
  }
}

// ── 呼吸法 ──
const PHASES = [
  { name: '吸う',   sec: 4,  scale: 1.32, op: 1    },
  { name: '止める', sec: 7,  scale: 1.32, op: 0.75  },
  { name: '吐く',   sec: 8,  scale: 1,    op: 0.55  },
];
let bTimer = null, bInterval = null;

function resetBreath() {
  clearTimeout(bTimer); clearInterval(bInterval);
  bTimer = null; bInterval = null;
  const ring = document.getElementById('breath-ring');
  ring.style.transform = 'scale(1)'; ring.style.opacity = '.6';
  document.getElementById('phase-name').textContent = '—';
  document.getElementById('countdown').textContent = '—';
  document.getElementById('breath-label').textContent = 'スタートを押してください';
  const btn = document.getElementById('breath-start-btn');
  btn.textContent = 'スタート'; btn.onclick = startBreath; btn.style.display = 'inline-block';
}

function startBreath() {
  document.getElementById('breath-start-btn').style.display = 'none';
  runPhase(0, 4);
}

function runPhase(pi, setsLeft) {
  if (setsLeft === 0) {
    document.getElementById('phase-name').textContent = '完了';
    document.getElementById('countdown').textContent = '✓';
    document.getElementById('breath-label').textContent = '4セット終わり。お疲れさまでした';
    log.breathDone = true;
    const btn = document.getElementById('breath-start-btn');
    btn.textContent = '宣言へ →'; btn.onclick = () => go('s5'); btn.style.display = 'inline-block';
    return;
  }
  const p = PHASES[pi];
  const ring = document.getElementById('breath-ring');
  const setNum = 4 - setsLeft;

  document.getElementById('phase-name').textContent = p.name;
  document.getElementById('breath-label').textContent =
    pi === 0 ? `セット ${5 - setsLeft} / 4` : '';

  ring.style.transition = `transform ${p.sec * 0.85}s ease-in-out, opacity ${p.sec * 0.85}s ease-in-out`;
  ring.style.transform = `scale(${p.scale})`;
  ring.style.opacity = p.op;

  // カウントダウン
  clearInterval(bInterval);
  let rem = p.sec;
  document.getElementById('countdown').textContent = rem;
  bInterval = setInterval(() => {
    rem--;
    document.getElementById('countdown').textContent = rem > 0 ? rem : '';
    if (rem <= 0) clearInterval(bInterval);
  }, 1000);

  const nextPi = (pi + 1) % 3;
  const nextSets = pi === 2 ? setsLeft - 1 : setsLeft;
  bTimer = setTimeout(() => runPhase(nextPi, nextSets), p.sec * 1000);
}

// ── 終了 ──
function finish(declaration) {
  log.declaration = declaration;
  log.end = jstNow();

  const declBox = document.getElementById('decl-box');
  const finalMsg = document.getElementById('final-msg');
  if (declaration) {
    declBox.textContent = '「' + declaration + '」';
    declBox.style.display = 'block';
    finalMsg.textContent = '明日はこれだけ。\nあとはよく眠ることが仕事。';
  } else {
    declBox.style.display = 'none';
    finalMsg.textContent = 'スマホを置いてください。\n今夜もじゅうぶんがんばった。';
  }

  buildLog();
  go('s6');
}

function buildLog() {
  let t = `=== 就寝ログ ===\n`;
  t += `開始  ${log.start}\n`;
  t += `終了  ${log.end}\n`;
  t += `呼吸法  ${log.breathDone ? '実施' : '未実施'}\n`;
  if (log.declaration) t += `宣言  ${log.declaration}\n`;
  if (log.chatLines.length) {
    t += `\n--- 会話 ---\n`;
    t += log.chatLines.join('\n');
  }
  document.getElementById('log-area').textContent = t;
}

async function copyLog() {
  const text = document.getElementById('log-area').textContent;
  try {
    await navigator.clipboard.writeText(text);
    const btn = document.querySelector('.log-copy-btn');
    btn.textContent = 'コピーしました ✓';
    setTimeout(() => btn.textContent = 'ログをコピー', 2200);
  } catch {
    alert('コピーできませんでした。テキストを長押しでコピーしてください。');
  }
}
</script>
